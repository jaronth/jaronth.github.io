---
---
<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="description" content="{{ site.description }}">
	<meta name="author" content="{{ site.author.name }}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ site.title }}</title>
	<link rel="apple-touch-icon" sizes="180x180" href="{{ 'apple-touch-icon.png' | relative_url }}">
	<link rel="icon" type="image/png" sizes="32x32" href="{{ 'favicon-32x32.png' | relative_url }}">
	<link rel="icon" type="image/png" sizes="16x16" href="{{ 'favicon-16x16.png' | relative_url }}">
	<link rel="manifest" href="{{ 'site.webmanifest' | relative_url }}">
	<link rel="mask-icon" href="{{ 'safari-pinned-tab.svg" color="#D8D8D8' | relative_url }}">
	<link rel="shortcut icon" href="{{ 'favicon.ico' | relative_url }}">
	<meta name="apple-mobile-web-app-title" content="{ j }">
	<meta name="application-name" content="{ j }">
	<meta name="msapplication-TileColor" content="#D8D8D8">
	<meta name="msapplication-config" content="{{ 'browserconfig.xml' | relative_url }}">
	<meta name="theme-color" content="#D8D8D8">    
	<link href="https://fonts.googleapis.com/css?family=Cutive+Mono" rel="stylesheet">
		
	<style type="text/css">{%- capture css -%}{%- include style.css -%}{%- endcapture -%}{{ css | strip_newlines }}</style>
	
	<script type="text/javascript">{%- capture js -%}{%- include google-analytics.js -%}{%- endcapture -%}{{ js | strip_newlines  }}</script>
</head>
<body>
	<h1>{{ site.author.name }}</h1>
	<img class="logo" alt="{ j }" src="{{ 'assets/jaronth.png' | relative_url }}" />
	<p>
		<a href="sms:{{ site.author.iMessage }}">
			{%- include apple.svg -%}
		</a> |
		<a href="https://github.com/{{ site.author.GitHub }}">
			{%- include github.svg -%}
		</a> | 
		<a href="https://www.buymeacoffee.com/{{ site.author.BuyMeACoffee }}">
			{%- include buymeacoffee.svg -%}
		</a>
	</p>
</body>
</html>
